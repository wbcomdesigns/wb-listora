<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>manifest graph</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<style>
  :root {
    --bg:#0a0c14; --panel:rgba(20,24,33,.78); --panel2:#1a1e2a;
    --text:#e7e9ee; --muted:#7d8597; --accent:#7aa9ff; --border:rgba(255,255,255,.06);
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; height:100%; background:var(--bg); color:var(--text);
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    overflow:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(1100px 700px at 20% 10%, rgba(122,169,255,.07), transparent 60%),
      radial-gradient(900px 700px at 80% 90%, rgba(236,72,153,.06), transparent 60%),
      radial-gradient(700px 500px at 50% 50%, rgba(16,185,129,.04), transparent 60%);
  }
  #app { display:grid; grid-template-columns:280px 1fr 340px; height:100vh; position:relative; z-index:1; }
  aside {
    background:var(--panel); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-right:1px solid var(--border); padding:18px; overflow-y:auto;
  }
  aside.right { border-right:0; border-left:1px solid var(--border); }
  h1 { font-size:14px; margin:0 0 4px; font-weight:600; letter-spacing:.01em; }
  h2 { font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin:18px 0 8px; font-weight:600; }
  .slug { color:var(--muted); font-size:11px; margin-bottom:14px; word-break:break-word; }
  .category { display:flex; align-items:center; gap:8px; padding:5px 0; cursor:pointer; user-select:none; font-size:12px; }
  .category input { accent-color:var(--accent); }
  .swatch { width:8px; height:8px; border-radius:50%; flex-shrink:0; box-shadow:0 0 6px currentColor; }
  .count { color:var(--muted); margin-left:auto; font-size:10px; font-variant-numeric:tabular-nums; }
  .ctrl { margin-bottom:10px; }
  .ctrl label { display:block; font-size:10px; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:.08em; }
  .ctrl input[type=text], .ctrl select {
    width:100%; padding:7px 9px; background:var(--panel2); color:var(--text);
    border:1px solid var(--border); border-radius:6px; font:inherit;
  }
  .ctrl input[type=text]:focus, .ctrl select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(122,169,255,.15); }
  .toggle { display:flex; align-items:center; gap:8px; padding:6px 0; cursor:pointer; user-select:none; font-size:12px; }
  .toggle input { accent-color:var(--accent); }
  main { position:relative; min-width:0; min-height:0; }
  #cy { position:absolute; inset:0; }
  .detail h3 { font-size:14px; margin:0 0 6px; word-break:break-word; font-weight:600; }
  .detail .id { font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:10px; color:var(--muted); margin-bottom:14px; word-break:break-word; padding:6px 8px; background:var(--panel2); border-radius:4px; }
  .detail dl { margin:0; }
  .detail dt { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-top:12px; }
  .detail dd { margin:3px 0 0; word-break:break-word; }
  .empty { color:var(--muted); font-style:italic; font-size:12px; }
  button {
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:7px 11px; font:inherit; cursor:pointer; font-size:12px;
  }
  button:hover { border-color:var(--accent); background:rgba(122,169,255,.08); }
  .stats { font-size:11px; color:var(--muted); margin-top:10px; }
  .stats div { display:flex; justify-content:space-between; padding:3px 0; font-variant-numeric:tabular-nums; }
  pre { background:var(--panel2); padding:8px; border-radius:4px; overflow-x:auto; font-size:11px; margin:0; white-space:pre-wrap; word-break:break-word; }
  .hint { font-size:10px; color:var(--muted); margin-top:14px; line-height:1.5; }
  .hint kbd { background:var(--panel2); padding:1px 5px; border-radius:3px; border:1px solid var(--border); font-family:ui-monospace,monospace; font-size:10px; }
</style>
</head>
<body>
<div id="app">
  <aside>
    <h1 id="title">manifest graph</h1>
    <div class="slug" id="subtitle">loading…</div>

    <div class="ctrl">
      <label for="search">Search</label>
      <input id="search" type="text" placeholder="hook, route, table, feature…">
    </div>

    <div class="ctrl">
      <label for="layout">Layout</label>
      <select id="layout">
        <option value="fcose">force (fcose)</option>
        <option value="cose">force (cose)</option>
        <option value="concentric">concentric</option>
        <option value="breadthfirst">tree</option>
        <option value="circle">circle</option>
      </select>
    </div>

    <label class="toggle">
      <input type="checkbox" id="show-isolated">
      Show isolated nodes
    </label>

    <h2>Categories</h2>
    <div id="categories"></div>

    <h2>Stats</h2>
    <div class="stats" id="stats"></div>

    <div class="ctrl" style="margin-top:18px;">
      <button id="reset">Reset view</button>
    </div>

    <div class="hint">
      <kbd>click</kbd> a node to inspect.
      <kbd>scroll</kbd> to zoom, <kbd>drag</kbd> to pan.
    </div>
  </aside>

  <main><div id="cy"></div></main>

  <aside class="right">
    <div id="detail" class="detail"><div class="empty">Click any node to see details.</div></div>
  </aside>
</div>

<script>
"use strict";

// Data is rendered via textContent / DOM methods — no innerHTML with manifest data.
// The manifest is in-repo and authored by tooling we trust, but constructing the
// DOM safely keeps the viewer usable if a manifest is ever generated from external input.

const COLORS = {
  rest:       { fill:'#3b82f6', label:'REST endpoint' },
  ajax:       { fill:'#0ea5e9', label:'AJAX action' },
  hook:       { fill:'#f59e0b', label:'Hook fired' },
  block:      { fill:'#a855f7', label:'Block' },
  table:      { fill:'#10b981', label:'DB table' },
  service:    { fill:'#14b8a6', label:'Service' },
  cron:       { fill:'#ef4444', label:'Cron job' },
  cpt:        { fill:'#eab308', label:'CPT' },
  taxonomy:   { fill:'#facc15', label:'Taxonomy' },
  capability: { fill:'#fb923c', label:'Capability' },
  admin:      { fill:'#94a3b8', label:'Admin page' },
  cli:        { fill:'#8b5cf6', label:'WP-CLI' },
  feature:    { fill:'#ec4899', label:'Feature (Pro)' },
};

const MANIFEST_URL = './manifest.json';
// For Pro plugins, set FREE_MANIFEST_URL to "../<free-slug>/audit/manifest.json"
// to draw cross-plugin Free→Pro coupling edges.
const FREE_MANIFEST_URL = null;

function el(tag, props = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') node.className = v;
    else if (k === 'data') for (const [dk, dv] of Object.entries(v)) node.dataset[dk] = dv;
    else if (k === 'style') node.style.cssText = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else if (typeof v === 'boolean') { if (v) node.setAttribute(k, ''); }
    else node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) {
    if (c == null || c === false) continue;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}

function setText(id, text) { document.getElementById(id).textContent = text; }
function clear(id) { const n = document.getElementById(id); while (n.firstChild) n.removeChild(n.firstChild); }

(async function init() {
  let manifest;
  try {
    manifest = await (await fetch(MANIFEST_URL)).json();
  } catch (err) {
    setText('subtitle', 'Failed to load manifest.json — open via local server (`python3 -m http.server` in this dir)');
    return;
  }

  setText('title', `${manifest.plugin.name} — graph`);
  setText('subtitle', `${manifest.plugin.slug} · v${manifest.plugin.version} · schema ${manifest.generated.schema_version}`);

  let freeManifest = null;
  if (FREE_MANIFEST_URL) {
    try { freeManifest = await (await fetch(FREE_MANIFEST_URL)).json(); } catch (err) { /* optional */ }
  }

  // Register fcose layout if available
  if (window.cytoscapeFcose) cytoscape.use(window.cytoscapeFcose);

  let showIsolated = false;
  const all = build(manifest, freeManifest);
  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements: filterIsolated(all, showIsolated),
    minZoom: 0.15,
    maxZoom: 4,
    wheelSensitivity: 0.25,
    style: cyStyle(),
    layout: cyLayout('fcose'),
  });

  renderCategories(all, cy);
  renderStats(cy);

  cy.on('tap', 'node', (e) => {
    const n = e.target;
    showDetail(n.data());
    highlightNeighborhood(cy, n);
  });
  cy.on('tap', (e) => {
    if (e.target === cy) { clearDetail(); cy.elements().removeClass('dim').removeClass('hot'); }
  });
  cy.on('mouseover', 'node', (e) => e.target.addClass('hover'));
  cy.on('mouseout',  'node', (e) => e.target.removeClass('hover'));

  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass('dim').removeClass('hot'); return; }
    const matches = cy.nodes().filter(n => (n.data('label') || '').toLowerCase().includes(q) || (n.data('id') || '').toLowerCase().includes(q));
    cy.elements().addClass('dim');
    matches.removeClass('dim').addClass('hot');
    matches.connectedEdges().removeClass('dim');
    matches.neighborhood().removeClass('dim');
  });

  document.getElementById('layout').addEventListener('change', (e) => {
    cy.layout(cyLayout(e.target.value)).run();
  });

  document.getElementById('show-isolated').addEventListener('change', (e) => {
    showIsolated = e.target.checked;
    cy.elements().remove();
    cy.add(filterIsolated(all, showIsolated));
    cy.layout(cyLayout(document.getElementById('layout').value)).run();
    renderStats(cy);
  });

  document.getElementById('reset').addEventListener('click', () => {
    cy.fit(null, 60); cy.center();
    document.getElementById('search').value = '';
    cy.elements().removeClass('dim').removeClass('hot');
  });

  document.querySelectorAll('#categories input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      cy.nodes(`[category = "${cb.dataset.cat}"]`).style('display', cb.checked ? 'element' : 'none');
    });
  });
})();

function cyStyle() {
  return [
    { selector: 'node', style: {
      'background-color': 'data(color)',
      'background-opacity': 0.85,
      'label': 'data(label)',
      'color': '#e7e9ee',
      'font-size': 10,
      'font-family': '-apple-system, system-ui, sans-serif',
      'font-weight': 500,
      'text-valign': 'bottom',
      'text-margin-y': 6,
      'text-outline-color': '#0a0c14',
      'text-outline-width': 3,
      'min-zoomed-font-size': 9,
      'width':  'data(size)',
      'height': 'data(size)',
      'border-width': 3,
      'border-color': 'data(color)',
      'border-opacity': 0.55,
      'overlay-padding': 8,
      'overlay-color': 'data(color)',
      'overlay-opacity': 0.10,
      'overlay-shape': 'ellipse',
    }},
    { selector: 'node.hover', style: {
      'overlay-opacity': 0.28, 'overlay-padding': 16, 'border-opacity': 1,
    }},
    { selector: 'node:selected', style: {
      'border-opacity': 1, 'overlay-opacity': 0.35, 'overlay-padding': 18,
    }},
    { selector: 'node.hot', style: {
      'border-opacity': 1, 'overlay-opacity': 0.4, 'overlay-padding': 20,
    }},
    { selector: 'node.dim', style: {
      'opacity': 0.18,
    }},
    { selector: 'edge', style: {
      'width': 'mapData(weight, 1, 3, 1.2, 2.4)',
      'line-color': 'data(edgeColor)',
      'curve-style': 'unbundled-bezier',
      'control-point-distances': [22],
      'control-point-weights': [0.5],
      'target-arrow-color': 'data(edgeColor)',
      'target-arrow-shape': 'triangle',
      'arrow-scale': 0.7,
      'opacity': 0.55,
      'line-opacity': 0.55,
    }},
    { selector: 'edge[kind = "consumed_by"]', style: { 'line-color':'#f59e0b', 'target-arrow-color':'#f59e0b', 'opacity':0.85 }},
    { selector: 'edge[kind = "cross_plugin"]', style: { 'line-color':'#ec4899', 'target-arrow-color':'#ec4899', 'line-style':'dashed', 'opacity':0.85 }},
    { selector: 'edge.dim', style: { 'opacity': 0.05 }},
  ];
}

function cyLayout(name) {
  if (name === 'fcose' && window.cytoscapeFcose) {
    return {
      name: 'fcose', animate: true, animationDuration: 700, fit: true, padding: 60,
      randomize: true, quality: 'default', nodeRepulsion: 6500, idealEdgeLength: 90,
      edgeElasticity: 0.45, gravity: 0.25, gravityRangeCompound: 1.5, numIter: 2500,
      tile: true, tilingPaddingVertical: 16, tilingPaddingHorizontal: 16,
    };
  }
  if (name === 'cose') {
    return { name:'cose', animate:true, fit:true, padding:60, nodeRepulsion:8000, idealEdgeLength:90, edgeElasticity:120, gravity:60, numIter:1500 };
  }
  if (name === 'concentric') {
    return { name:'concentric', animate:true, fit:true, padding:60, minNodeSpacing:30,
      concentric: n => n.degree() + (n.data('big') ? 5 : 0), levelWidth: () => 1 };
  }
  return { name, animate:true, fit:true, padding:60 };
}

function filterIsolated(elements, show) {
  // Build node→degree map (always — used for size-by-degree)
  const degree = {};
  elements.forEach(e => {
    if (e.data && e.data.source) {
      degree[e.data.source] = (degree[e.data.source] || 0) + 1;
      degree[e.data.target] = (degree[e.data.target] || 0) + 1;
    }
  });

  // Mutate node `size` so it scales with degree, like Obsidian/Neo4j.
  // Base size from the build() opts is a floor; each connection adds 3px,
  // capped at +30 so highly-connected nodes don't dominate the canvas.
  const SIZE_PER_DEGREE = 3;
  const SIZE_CAP = 30;
  elements.forEach(e => {
    if (e.data && !e.data.source) {
      const deg = degree[e.data.id] || 0;
      e.data.degree = deg;
      const base = e.data.size || 14;
      e.data.size = base + Math.min(deg * SIZE_PER_DEGREE, SIZE_CAP);
    }
  });

  if (show) return elements;
  return elements.filter(e => {
    if (!e.data) return false;
    if (e.data.source) return true; // edges
    return (degree[e.data.id] || 0) > 0;
  });
}

function highlightNeighborhood(cy, n) {
  const nbhd = n.closedNeighborhood();
  cy.elements().addClass('dim');
  nbhd.removeClass('dim');
  n.addClass('hot');
}

function build(m, freeManifest) {
  const nodes = [];
  const edges = [];
  const seen = new Set();

  const addNode = (id, label, category, opts = {}) => {
    if (seen.has(id)) return;
    seen.add(id);
    nodes.push({ data: {
      id, label, category,
      color: (COLORS[category] && COLORS[category].fill) || '#666',
      size: opts.size || 14,
      big: !!opts.big,
      ...opts.extra,
    }});
  };
  const addEdge = (source, target, kind = 'rel', weight = 1) => {
    if (!seen.has(source) || !seen.has(target)) return;
    const id = `e:${source}->${target}:${kind}`;
    if (edges.find(e => e.data.id === id)) return;
    let edgeColor = '#3a4053';
    if (kind === 'consumed_by') edgeColor = '#f59e0b';
    else if (kind === 'cross_plugin') edgeColor = '#ec4899';
    else if (kind === 'rest_table') edgeColor = '#10b981';
    else if (kind === 'block_hook') edgeColor = '#a855f7';
    else if (kind === 'feature_hook') edgeColor = '#ec4899';
    edges.push({ data: { id, source, target, kind, edgeColor, weight }});
  };

  const tableSet = new Set((m.tables || []).map(t => t.name));

  // === NODES ===

  (m.rest && m.rest.endpoints || []).forEach(e => {
    const id = `rest:${(e.methods || ['GET']).join('|')}:${e.route}`;
    const label = (e.methods && e.methods[0] || 'GET') + ' ' + e.route.replace(/^\/[^/]+\/v\d+/, '');
    addNode(id, label, 'rest', { size:14, extra:{ route:e.route, methods:e.methods, handler:e.handler, permission:e.permission, purpose:e.purpose }});
  });

  (m.ajax || []).forEach(a => addNode(`ajax:${a.action}`, a.action, 'ajax', { size:13, extra:{ handler:a.handler, nonce:a.nonce, capability:a.capability, purpose:a.purpose }}));

  (m.hooks_fired || []).forEach(h => {
    // v1: consumed_by is string|null. v2: consumed_by is array.
    const hasConsumer = Array.isArray(h.consumed_by)
      ? h.consumed_by.length > 0
      : !!h.consumed_by;
    addNode(`hook:${h.name}`, h.name, 'hook', { size: hasConsumer ? 18 : 12, big: hasConsumer, extra:{ type:h.type, args: h.args_count || h.args, args_signature: h.args_signature, where:h.where, consumed_by:h.consumed_by }});
  });

  (m.blocks || []).forEach(b => addNode(`block:${b.name}`, b.name.replace(/^[^/]+\//, ''), 'block', { size:18, big:true, extra:{ render:b.render, interactivity:b.interactivity }}));
  (m.tables || []).forEach(t => addNode(`table:${t.name}`, t.name, 'table', { size:18, big:true, extra:{ purpose:t.purpose }}));
  (m.services || []).forEach(s => addNode(`service:${s.key}`, s.key, 'service', { size:16, big:true, extra:{ class:s.class, added:s.added }}));
  (m.cron || []).forEach(c => addNode(`cron:${c.hook}`, c.hook, 'cron', { size:14, extra:{ interval:c.interval, handler:c.handler, engine:c.engine }}));
  (m.post_types || []).forEach(p => addNode(`cpt:${p.name}`, p.name, 'cpt', { size:18, big:true, extra:{ purpose:p.purpose, public:p.public }}));
  (m.taxonomies || []).forEach(t => addNode(`tax:${t.name}`, t.name, 'taxonomy', { size:14, extra:{ post_type:t.post_type, hierarchical:t.hierarchical }}));
  (m.capabilities || []).forEach(c => addNode(`cap:${c.cap}`, c.cap, 'capability', { size:13, extra:{ default_roles:c.default_roles }}));
  (m.admin_pages || []).forEach(p => addNode(`admin:${p.slug}`, p.title, 'admin', { size:14, extra:{ slug:p.slug, parent:p.parent, capability:p.capability }}));
  (m.wp_cli || []).forEach(c => addNode(`cli:${c.name}`, 'wp ' + c.name, 'cli', { size:14, big:true, extra:{ handler:c.handler, subcommands:c.subcommands }}));

  // Pro feature classes (subsystem -> per-class nodes)
  if (m.subsystems) {
    m.subsystems.forEach(sub => {
      (sub.key_classes || []).forEach(cls => {
        addNode(`feature:${cls}`, cls, 'feature', { size:18, big:true, extra:{ namespace:sub.namespace, purpose:sub.purpose }});
      });
    });
  }

  // === EDGES (intra-plugin inferred relationships) ===

  // hook → consumer (already in manifest)
  // Handle BOTH legacy v1 string-or-null and v2 array-of-strings shapes.
  const consumersOf = (h) => {
    if (!h.consumed_by) return [];
    if (Array.isArray(h.consumed_by)) return h.consumed_by.filter(Boolean);
    if (typeof h.consumed_by === 'string') return [h.consumed_by];
    return [];
  };
  (m.hooks_fired || []).forEach(h => {
    consumersOf(h).forEach(consumer => {
      // consumer might be a Pro feature class — check existence first
      const consumerId = `feature:${String(consumer).split(' ')[0].split('(')[0].trim()}`;
      if (seen.has(consumerId)) {
        addEdge(`hook:${h.name}`, consumerId, 'consumed_by', 2);
      } else {
        // fallback — create a generic consumer node
        const fallback = `consumer:${consumer}`;
        addNode(fallback, String(consumer), 'feature', { size:16, big:true });
        addEdge(`hook:${h.name}`, fallback, 'consumed_by', 2);
      }
    });
  });

  // REST endpoint → table (route name contains table name)
  (m.rest && m.rest.endpoints || []).forEach(e => {
    const restId = `rest:${(e.methods || ['GET']).join('|')}:${e.route}`;
    const route = e.route.toLowerCase();
    tableSet.forEach(t => {
      // listora_reviews → reviews — match plain
      const stem = t.replace(/^[^_]+_/, '').replace(/_/g, '');
      if (route.includes('/' + stem)) {
        addEdge(restId, `table:${t}`, 'rest_table', 1);
      }
    });
  });

  // block render/where → hooks fired in that file
  (m.blocks || []).forEach(b => {
    const blockId = `block:${b.name}`;
    const renderPath = (b.render || '').replace(/\\/g, '/');
    if (!renderPath) return;
    const blockDir = renderPath.split('/').slice(0, 2).join('/'); // e.g., blocks/listing-grid
    (m.hooks_fired || []).forEach(h => {
      const where = (h.where || '').replace(/\\/g, '/');
      if (where && where.startsWith(blockDir)) {
        addEdge(blockId, `hook:${h.name}`, 'block_hook', 1);
      }
    });
  });

  // cron handler → service or feature
  (m.cron || []).forEach(c => {
    const cronId = `cron:${c.hook}`;
    const handlerStr = c.handler || '';
    // try to match a service/feature class name in the handler
    const classMatch = handlerStr.match(/([A-Za-z_]+)::/);
    if (classMatch) {
      const cls = classMatch[1];
      const featureId = `feature:${cls}`;
      const serviceId = `service:${cls}`;
      if (seen.has(featureId)) addEdge(cronId, featureId, 'feature_hook', 1);
      else if (seen.has(serviceId)) addEdge(cronId, serviceId, 'feature_hook', 1);
    }
  });

  // admin page → capability
  (m.admin_pages || []).forEach(p => {
    if (p.capability && seen.has(`cap:${p.capability}`)) {
      addEdge(`admin:${p.slug}`, `cap:${p.capability}`, 'rel', 1);
    }
  });

  // CPT → REST routes that reference it
  (m.post_types || []).forEach(p => {
    const cptId = `cpt:${p.name}`;
    const cptStem = p.name.replace(/^[^_]+_/, ''); // listora_listing → listing
    (m.rest && m.rest.endpoints || []).forEach(e => {
      if ((e.route || '').toLowerCase().includes('/' + cptStem)) {
        const restId = `rest:${(e.methods || ['GET']).join('|')}:${e.route}`;
        addEdge(cptId, restId, 'rel', 1);
      }
    });
  });

  // Pro features → REST routes (handler class match)
  if (m.subsystems) {
    m.subsystems.forEach(sub => {
      (sub.key_classes || []).forEach(cls => {
        const featureId = `feature:${cls}`;
        (m.rest && m.rest.endpoints || []).forEach(e => {
          if ((e.handler || '').includes(cls)) {
            const restId = `rest:${(e.methods || ['GET']).join('|')}:${e.route}`;
            addEdge(featureId, restId, 'feature_hook', 1);
          }
        });
      });
    });
  }

  // === Cross-plugin edges (Pro view: Free hooks → Pro features) ===
  if (freeManifest && m.free_filters_hooked) {
    m.free_filters_hooked.forEach(fh => {
      const freeHookId = `freehook:${fh.filter}`;
      addNode(freeHookId, fh.filter, 'hook', { size:18, big:true, extra:{ source:'free', behavior:fh.behavior, where:fh.where }});
      // try to map fh.where to one of our feature class names
      const consumer = (fh.where || '').match(/([A-Z][A-Za-z_]+)/);
      if (consumer) {
        const featureId = `feature:${consumer[1]}`;
        if (seen.has(featureId)) {
          addEdge(freeHookId, featureId, 'cross_plugin', 2);
        }
      }
    });
  }

  return [...nodes, ...edges];
}

function renderCategories(elements, cy) {
  const cats = {};
  elements.forEach(e => { if (e.data && e.data.category) cats[e.data.category] = (cats[e.data.category] || 0) + 1; });
  const container = document.getElementById('categories');
  clear('categories');
  Object.entries(cats).sort((a, b) => b[1] - a[1]).forEach(([cat, count]) => {
    const cb = el('input', { type: 'checkbox', data: { cat } });
    cb.checked = true;
    container.appendChild(el('label', { class: 'category' }, [
      cb,
      el('span', { class: 'swatch', style: `background:${(COLORS[cat] && COLORS[cat].fill) || '#666'};color:${(COLORS[cat] && COLORS[cat].fill) || '#666'}` }),
      (COLORS[cat] && COLORS[cat].label) || cat,
      el('span', { class: 'count' }, [String(count)]),
    ]));
  });
}

function renderStats(cy) {
  const nodeCount = cy.nodes().length;
  const edgeCount = cy.edges().length;
  const isolated = cy.nodes().filter(n => n.degree() === 0).length;
  const container = document.getElementById('stats');
  clear('stats');
  container.appendChild(el('div', {}, [el('span', {}, ['nodes']), el('span', {}, [String(nodeCount)])]));
  container.appendChild(el('div', {}, [el('span', {}, ['edges']), el('span', {}, [String(edgeCount)])]));
  container.appendChild(el('div', {}, [el('span', {}, ['isolated']), el('span', {}, [String(isolated)])]));
}

function showDetail(d) {
  const root = document.getElementById('detail');
  while (root.firstChild) root.removeChild(root.firstChild);
  root.appendChild(el('h3', {}, [d.label || '']));
  root.appendChild(el('div', { class: 'id' }, [d.id || '']));
  const dl = el('dl');
  const skip = new Set(['id', 'label', 'category', 'color', 'big', 'size']);
  for (const [k, v] of Object.entries(d)) {
    if (skip.has(k) || v == null) continue;
    dl.appendChild(el('dt', {}, [k]));
    if (typeof v === 'object') dl.appendChild(el('dd', {}, [el('pre', {}, [JSON.stringify(v, null, 2)])]));
    else dl.appendChild(el('dd', {}, [String(v)]));
  }
  root.appendChild(dl);
}

function clearDetail() {
  const root = document.getElementById('detail');
  while (root.firstChild) root.removeChild(root.firstChild);
  root.appendChild(el('div', { class: 'empty' }, ['Click any node to see details.']));
}
</script>
